# ----------------------------------------------------------------------------
# go2rtc - Bambu RTSPS pull + ffmpeg overlay re-encode
# ----------------------------------------------------------------------------
# Replace IPs and access codes with your printer's values.
# Add additional printers by duplicating both the source and the public-stream
# entries, and adding a matching drawtext template at the bottom.
#
# Bambu printers use self-signed TLS certs - the rtspx:// scheme tells go2rtc
# to skip verification.
# ----------------------------------------------------------------------------
# PERFORMANCE TUNING
# ----------------------------------------------------------------------------
# Software H.264 encoding with the drawtext overlay is the most CPU-intensive
# part of this stack. The defaults below (30fps, veryfast preset, 4 Mbps)
# produce excellent quality and work fine for 1-2 printers on most hardware.
#
# If you're running multiple printers and your CPU is at capacity, change
# these per-stream encoder flags (in each `drawtext=NAME` line):
#
#   -r 30        -> -r 15        # ~2x less encode work, still smooth motion
#   -r 30        -> -r 10        # ~3x less encode work, fine for print bed
#   -preset:v veryfast    -> -preset:v ultrafast    # ~2x faster, slight quality drop
#   -b:v 4M -maxrate:v 5M -bufsize:v 10M  -> -b:v 2M -maxrate:v 3M -bufsize:v 6M
#
# Reference figures from a Synology DS1621+ (Ryzen V1500B, 4c/8t) running
# four 1080p simultaneous streams with overlay:
#
#   Defaults (30fps / veryfast / 4Mbps):     ~415% CPU total (~50% of host)
#   Tuned   (10fps / ultrafast / 2Mbps):     ~210% CPU total (~25% of host)
#
# Match `-g:v` and `-keyint_min:v` to be roughly equal to `-r` (one keyframe
# per second of output). Don't change `-sc_threshold:v 0` (forces fixed
# keyframe interval, which UniFi Protect prefers).
# ----------------------------------------------------------------------------

streams:
  # Raw upstream pulls (private; only consumed by ffmpeg below).
  # Format: rtspx://bblp:<ACCESS_CODE>@<PRINTER_IP>:322/streaming/live/1
  gort_src: rtspx://bblp:YOUR_ACCESS_CODE@192.168.1.170:322/streaming/live/1

  # Public streams: re-encoded with overlay (drawbox background + 4 drawtext layers).
  # The "drawtext=NAME" suffix references a custom template defined below.
  gort: ffmpeg:gort_src#video=drawtext=gort

ffmpeg:
  # Per-printer drawtext templates.
  #
  # Each pipeline does:
  #   1. drawbox - paint a single semi-transparent black rectangle across the
  #      bottom of the frame. ALL text sits on top of this bar, so the
  #      background is consistent regardless of line length.
  #   2. Four drawtext filters chained, one per overlay line. NO per-text
  #      box (box=0) since drawbox handles the background.
  #
  # Layout (1080p source, 26px font):
  #   bar covers y=h-180 to y=h (180 pixels tall, comfortable padding)
  #   line 1 (header):    y = h-165
  #   line 2 (progress):  y = h-128
  #   line 3 (filament):  y = h-91
  #   line 4 (job):       y = h-50
  #
  # The bambu-overlay container writes the four text files (gort_1.txt
  # through gort_4.txt) every second.
  #
  # expansion=none keeps drawtext from interpreting % as strftime escapes.
  #
  # Encoder settings are tuned for broad compatibility with UniFi Protect's
  # H.264 decoder. See the comment block at top of this file for tuning
  # options if you need to reduce CPU load.

  drawtext=gort: -c:v libx264 -profile:v baseline -level:v 4.0 -preset:v veryfast -pix_fmt:v yuv420p -r 30 -g:v 30 -keyint_min:v 30 -sc_threshold:v 0 -b:v 4M -maxrate:v 5M -bufsize:v 10M -vf "drawbox=x=0:y=ih-180:w=iw:h=180:color=black@0.55:t=fill,drawtext=textfile=/data/overlay/gort_1.txt:reload=1:expansion=none:fontfile=/usr/share/fonts/droid/DroidSansMono.ttf:fontsize=26:fontcolor=white:x=20:y=h-165,drawtext=textfile=/data/overlay/gort_2.txt:reload=1:expansion=none:fontfile=/usr/share/fonts/droid/DroidSansMono.ttf:fontsize=26:fontcolor=white:x=20:y=h-128,drawtext=textfile=/data/overlay/gort_3.txt:reload=1:expansion=none:fontfile=/usr/share/fonts/droid/DroidSansMono.ttf:fontsize=26:fontcolor=white:x=20:y=h-91,drawtext=textfile=/data/overlay/gort_4.txt:reload=1:expansion=none:fontfile=/usr/share/fonts/droid/DroidSansMono.ttf:fontsize=26:fontcolor=white:x=20:y=h-50"
