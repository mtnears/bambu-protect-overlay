# ----------------------------------------------------------------------------
# rtsp-to-onvif (daniela-hase/onvif-server) - virtual ONVIF cameras
# ----------------------------------------------------------------------------
# Each printer becomes a virtual ONVIF camera with its own MAC address and
# port range. UniFi Protect discovers and adopts these as third-party cameras.
#
# Important values to set per printer:
#   mac          - Locally-administered MAC. Each printer needs a UNIQUE one.
#                  Must start with 02, 06, 0A, 0E, 12, 16, ... 1A, 1E, 22 etc.
#                  (any value where the second nibble is 2, 6, A, or E)
#   ports.server - ONVIF service port. Pick any free port on your host.
#   ports.rtsp   - RTSP proxy port for this camera. Pick any free port.
#   ports.snapshot - HTTP snapshot proxy port. Pick any free port.
#   uuid         - Generate a fresh UUID for each printer (uuidgen on Linux,
#                  or any online UUID generator).
#   target.hostname - Your Docker host's IP on the LAN (NOT 127.0.0.1).
#                     This is the address Protect will pull RTSP from.
#
# Pick port numbers that are well clear of common services. The 11000-11100
# range is generally safe.
# ----------------------------------------------------------------------------

onvif:
  - mac: 1A:11:B0:5B:B3:5D
    ports:
      server: 11087     # ONVIF SOAP endpoint
      rtsp: 11057       # RTSP proxy
      snapshot: 11088   # HTTP snapshot proxy
    name: Gort
    uuid: f8299aa3-086c-4936-96d5-2f96756fa7e4
    highQuality:
      rtsp: /gort                                  # path under target hostname
      snapshot: /api/frame.jpeg?src=gort           # go2rtc's snapshot endpoint
      width: 1680
      height: 1080
      framerate: 30
      bitrate: 4096
      quality: 4
    target:
      hostname: 192.168.1.10                       # ⬅ YOUR Docker host IP
      ports:
        rtsp: 8554                                 # go2rtc default RTSP port
        snapshot: 1984                             # go2rtc default API/snapshot port

  # Add more printers by duplicating the block above and changing:
  # - mac (unique locally-administered MAC per printer)
  # - ports.{server,rtsp,snapshot} (unique per printer)
  # - name and uuid
  # - highQuality.rtsp path (matches the stream name in go2rtc.yaml)
  # - highQuality.snapshot src= parameter (also matches stream name)
